<!DOCTYPE html>
<html lang="{{locale}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #313338; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #313338; padding: 20px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color: #2B2D31; border-radius: 8px; overflow: hidden;">
          <!-- Header -->
          <tr>
            <td align="center" style="padding: 30px 30px 20px 30px; background-color: #1E1F22;">
              <img src="{{logo_url}}" alt="OpenCord" width="120" style="display: block;">
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding: 30px; color: #DBDEE1; font-size: 16px; line-height: 1.5;">
              {{content}}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding: 20px 30px 30px 30px; border-top: 1px solid #3F4147; color: #80848E; font-size: 12px; text-align: center;">
              <p>Cet email a été envoyé par OpenCord. Si vous n'avez pas demandé cette action, ignorez cet email.</p>
              <p style="margin-top: 10px;">© 2024 OpenCord. Tous droits réservés.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
